name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          # This trinity-core job runs WITHOUT submodules — it is self-sufficient;
          # submodule-dependent gates gate on `steps.subm.outputs.present`. Full
          # cross-substrate coverage lives in the isolated `cross-substrate` job
          # below. myc + genesis (omega) are now PUBLIC; only liquid is private.
          submodules: false

      - name: Detect submodules
        id: subm
        run: |
          if [ -f liquid/deno.jsonc ] && [ -f myc/deno.jsonc ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::submodules absent — submodule-dependent gates skipped"
          fi

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Drop submodule workspace members when absent
        if: steps.subm.outputs.present == 'false'
        run: |
          # The root deno.jsonc lists ./liquid ./myc ./omega as workspace
          # members; with the private submodules absent, deno cannot resolve the
          # workspace and every deno command fails. Strip the workspace array for
          # this ephemeral CI checkout (trinity-core needs none of the members).
          perl -0pi -e 's/"workspace":\s*\[[^\]]*\],\s*//' deno.jsonc

      - name: Verify formatting
        run: deno fmt --check

      - name: Type check core source files
        run: |
          if [ "${{ steps.subm.outputs.present }}" = "true" ]; then
            deno check src/*.ts
          else
            # The liquid submodule is reached only by x5F10 (re-export) and its
            # sole importer x5F00 (the t-apply organ, loaded dynamically). That
            # 2-file closure is the complete static liquid dependency; exclude
            # both when liquid is absent. Everything else type-checks standalone.
            deno check $(ls src/*.ts | grep -vE 'x5F00|x5F10')
          fi

      - name: Run trinity-core unit tests
        # Submodule- and net-independent organ-logic tests (myc_proxy/import_map
        # bind a port and are excluded by the task). Catches regressions that
        # type-check + sig verification cannot — e.g. closure feedback ordering,
        # resolver identity classification, AST skill drift. Safe with the
        # workspace stripped above.
        run: deno task test:unit

      - name: Substrate status check
        run: ./t status

      - name: Verify status health warning propagation
        run: ./t status | jq -e '.summary.health.warn == .substrate_health.own_organs.warn and (.summary.health.warn | type) == "number"'

      - name: Verify status CI freshness shape
        run: ./t status | jq -e '(.summary.ci_freshness | IN("fresh", "stale", "unknown")) and (.substrate_health.external_ci.is_stale | type) == "boolean"'

      - name: Verify status worktree shape
        run: ./t status | jq -e '(.summary.worktree.dirty | type) == "boolean" and (.summary.worktree.changed_files | type) == "number" and (.substrate_health.extras["trinity.worktree"].schema == "trinity.worktree.v0.1")'

      - name: Verify help JSON ignores flags
        run: ./t help --json | jq -e '.type == "help" and .mode == "list" and (.records | type) == "array"'

      # NOTE: the former "Verify status live evidence refresh" gate (./t status
      # --live asserting ci_freshness=="fresh" && is_stale==false) is removed: it
      # is self-defeating inside CI — the only run the live fetch can see is the
      # currently-running job, which is never green mid-run, and the fetch blocks
      # with no timeout (the step was SIGTERM'd after ~4m). The non-live "Verify
      # status CI freshness shape" gate above already validates the shape.

      - name: Verify self and capabilities receipt schemas
        run: ./t capabilities --json | jq -e '[.capabilities[] | select(.primary == "audit" or .primary == "status" or .primary == "self" or .primary == "capabilities" or .primary == "external-surfaces" or .primary == "agents" or .primary == "skill" or .primary == "memory" or .primary == "roadmap" or .primary == "probes" or .primary == "ecosystem" or .primary == "gravity" or .primary == "contract-audit" or .primary == "lexicon" or .primary == "myc-status-shadow" or .primary == "myc-capabilities-shadow" or .primary == "myc-protocol-audit-shadow" or .primary == "export-clean" or .primary == "self-portrait") | select(.receipt_schema != null)] | length == 19'

      - name: Verify capabilities detail lookup
        run: ./t capabilities external-surfaces --json | jq -e '.type == "capabilities" and .position == "4/A" and .action == "show" and .capabilities[0].primary == "external-surfaces" and (.capabilities[0].receipt_schema.type == "external_surfaces")'

      - name: Verify capabilities schema inventory
        run: ./t capabilities validate --json | jq -e '.type == "capabilities_validation" and .summary.valid == true and .summary.duplicate_schema_types == 0 and .summary.unclassified_schema_types == 0 and .summary.schemas_total >= .summary.linked_schema_types and (.schema_linkage | type) == "array"'

      - name: Verify generator JSON receipts
        run: |
          ./t agents --stable --json | jq -e '.type == "agents" and .position == "8/8" and (.manifest_hash | startswith("sha256:"))'
          ./t skill --stable --json | jq -e '.type == "skill" and .position == "8/C" and (.manifest_hash | startswith("sha256:"))'
          ./t memory --stable --json | jq -e '.type == "memory" and .position == "8/A" and (.manifest_hash | startswith("sha256:"))'
          ./t roadmap --stable --json | jq -e '.type == "roadmap" and .position == "8/D" and (.manifest_hash | startswith("sha256:"))'
          ./t probes --stable --json | jq -e '.type == "probes" and .position == "8/E" and (.manifest_hash | startswith("sha256:"))'

      - name: Verify cross-substrate flat-src mappings
        if: steps.subm.outputs.present == 'true'
        run: |
          ./t all 5/C --only trinity | jq -e '.type == "all" and .mode == "only:trinity" and .summary.overall == "passed"'
          ./t all 5/C --only liquid | jq -e '.type == "all" and .mode == "only:liquid" and .summary.overall == "passed"'
          ./t cross-verify trinity | jq -e '.type == "all" and .mode == "only:trinity" and .summary.overall == "passed"'
          ./t cross-verify liquid | jq -e '.type == "all" and .mode == "only:liquid" and .summary.overall == "passed"'

      # The canon-vectors oracle declares the FQDN naming convention all
      # substrates must reproduce. liquid had no verifier, so its
      # calculateFqdnHash could drift undetected; this drives liquid's impl
      # against the oracle so the swarm's name=hash convention stays coherent.
      - name: Verify liquid FQDN hash agrees with canon oracle
        if: steps.subm.outputs.present == 'true'
        run: deno task canon:verify:cross

      # Substrate Court law-agreement invariant (codex R2 / antigravity T3). The
      # court's single authoritative `law_drift` signal must be false: no
      # law_hash_drift among witnesses and no omega/trinity bridge inconsistency.
      # This is the legitimate CI-gate form of "block merges on law drift" — an
      # invariant assertion, not autonomous governance. Runs ALWAYS: with
      # submodules absent it reflects trinity's self-witness (bridge null,
      # drift false — graceful); with them present it cross-checks all witnesses
      # and reds main on real drift. Asserts `law_drift`, NOT `court.agreement`
      # (which is legitimately false: distinct substrates have divergent body
      # hashes — that is body_hash_divergence, not law drift).
      - name: Verify Substrate Court law agreement (no law drift)
        run: ./t court --live | jq -e '.type == "SubstrateCourtLiveVerdict" and .position == "6/E" and .law_drift == false and (.witnesses | type) == "array" and (.witnesses | length) >= 1'

      # When submodules are present the cross-substrate law bridge must actually
      # be exercised (omega's native law_hash present and equal to trinity's
      # witnessed value) — guards against the gate above passing vacuously
      # because the court silently stopped seeing omega.
      - name: Verify Substrate Court cross-substrate bridge exercised
        if: steps.subm.outputs.present == 'true'
        run: ./t court --live | jq -e '.law_bridge.omega_native != null and .law_bridge.trinity_witnessed != null and .law_bridge.consistent == true'

      - name: Verify recipes detail lookup
        run: ./t recipes show recipe.metacognition.field-cycle --json | jq -e '.type == "recipes" and .position == "3/C" and .action == "show" and .recipes[0].id == "recipe.metacognition.field-cycle"'

      - name: Verify diagnostic JSON receipts
        run: |
          ./t ecosystem --json | jq -e '.type == "ecosystem" and .position == "2/2" and (.summary.substrates | type) == "number"'
          ./t contract-audit --json | jq -e '.type == "contract_audit" and .position == "4/F1" and .summary.total > 0'
          ./t lexicon --json | jq -e '.type == "lexicon" and .position == "2/A" and .summary.surfaced_patterns > 0'

      - name: Verify self attention summary
        run: ./t self --json | jq -e '(.attention.level | IN("clear", "watch", "act")) and (.attention.score | type) == "number" and (.attention.reasons | type) == "array" and (.attention.next_actions | type) == "array" and (.audit_boundaries.import_warnings == 0) and (.audit_boundaries.boundary_imports | type) == "number" and (.audit_boundaries.registry_warnings == 0) and (.capabilities_validation.valid == true) and (.capabilities_validation.unclassified_schema_types == 0) and (.capabilities_schema_classes.linked_command | type) == "number" and (.decisions.unresolved_proposals | type) == "number" and (.decisions.proposal_triage.review | type) == "number" and ((.decision_next_action == null) or (.decision_next_action.kind | type) == "string")'

      - name: Verify MYC x9 shadow status
        if: steps.subm.outputs.present == 'true'
        run: ./t myc-status-shadow --json | jq -e '.type == "myc_status_shadow" and .position == "9/2E" and .shadow == true and .summary.overall == "healthy"'

      - name: Verify MYC x9 shadow capabilities
        if: steps.subm.outputs.present == 'true'
        run: ./t myc-capabilities-shadow --json | jq -e '.type == "myc_capabilities_shadow" and .position == "9/4A" and .shadow == true and .summary.total >= 0'

      - name: Verify MYC x9 shadow protocol audit
        if: steps.subm.outputs.present == 'true'
        run: ./t myc-protocol-audit-shadow --json | jq -e '.type == "myc_protocol_audit_shadow" and .position == "9/6C" and .shadow == true and .summary.overall == "healthy"'

      - name: Audit coordinates
        run: ./t audit --json | jq -e '.summary.mismatch == 0 and .summary.malformed == 0 and .summary.no_dipole_organ_gap == 0 and .summary.orphans_count == 0 and .summary.import_warnings_count == 0 and .summary.registry_warnings_count == 0 and .coordinate_uniqueness.ok == true'

      # Invariant, not a frozen count: unsigned chords always pass (keyless
      # mode is legal); a chord that CARRIES a content_sig must verify against
      # the committed pubkey registry — tampering with a signed chord, or
      # forging a signature, turns main red. Needs no private keys.
      - name: Verify chord signatures (provenance integrity)
        run: deno task voice-keys verify-all | jq -e '.type == "chord_sig_verify_all" and .invalid == 0'

      - name: Verify lexicon block ordering
        run: ./t lexicon --stable --json | jq -e '.type == "lexicon" and .position == "2/A" and .summary.surfaced_patterns > 0 and ([.entries[] | select(.first_seen_block > 0 and .last_seen_block >= .first_seen_block)] | length) > 0'

      - name: Verify inbox JSON summary
        run: ./t inbox --json | jq -e '.type == "inbox" and .position == "2/D" and (.summary.total_pending | type) == "number" and (.summary.voices_with_pending | type) == "number" and (.pending_voices | type) == "array" and all(.pending_voices[]; (.voice | type) == "string" and (.count | type) == "number") and ((.next_action == null) or (.next_action.voice | type) == "string")'

      - name: Verify inbox next action
        run: ./t inbox --next --json | jq -e '.type == "inbox_next" and .position == "2/D" and ((.next_action == null) or ((.next_action.voice | type) == "string" and (.next_action.chord_path | type) == "string"))'

      - name: Verify heartbeat JSON summary
        run: ./t heartbeat --json | jq -e '.type == "heartbeat" and .position == "2/7" and (.summary.chords_28d | type) == "number" and (.summary.stalled | type) == "boolean" and (.summary.pulse_state | IN("healthy", "consolidating", "stalled"))'

      - name: Verify gravity JSON summary
        run: ./t gravity --json | jq -e '.type == "gravity" and .position == "6/02" and .summary.total_edges == .total_edges and (.summary.library_edges | type) == "number"'

      - name: Verify clean export dry-run
        run: ./t export-clean --dry-run | jq -e '.type == "export_clean" and .position == "7/4" and .dry_run == true and .summary.total_files > 0'

      - name: Verify contracts
        run: ./t contracts

      - name: Verify contracts detail lookup
        run: ./t contracts show IN_LEDGER_OUT.v0.1.md --json | jq -e '.type == "contracts" and .position == "4/F" and .action == "show" and .contracts[0].filename == "IN_LEDGER_OUT.v0.1.md"'

      - name: Verify evidence and heartbeat schemas
        run: ./t capabilities --json | jq -e '[.capabilities[] | select(.primary == "evidence" or .primary == "heartbeat") | select(.receipt_schema != null)] | length == 2'

      - name: Verify contract ref-graph audit format
        run: ./t contract-audit --json | jq -e '.type == "contract_audit" and .summary.total > 0 and (.summary.safe_to_compost // 0) == 0 and (.summary.needs_review // 0) == 0'

      - name: Verify external surfaces format
        run: ./t external-surfaces --json | jq -e '.type == "external_surfaces" and ([.entries[] | select(.category == "local_cache")] | length) == 0 and .summary.dynamic_topology > 0 and .summary.live_chord == 0 and ([.entries[] | select(.category == "dynamic_topology" and .canonical_status == "canonical")] | length) == .summary.dynamic_topology and ([.entries[] | select(.category == "dynamic_topology")] | length) == .summary.dynamic_topology and (.runtime_cache_summary.total | type) == "number" and (.runtime_cache_summary.stale_7d | type) == "number"'

      - name: Verify chord migration plan
        run: ./t chord-migrate --json | jq -e '.type == "chord_migration_plan" and .dry_run == true and .summary.chords == 0 and .summary.already_migrated > 0 and .summary.inferred_coordinates == 0 and .summary.inferred_block_keys == 0 and .summary.inferred_voices == 0 and .summary.warnings == 0 and ([.entries[].warnings[]? | select(. == "target collision disambiguated")] | length) == 0'

      - name: Verify external surfaces stale runtime prune dry-run
        run: ./t external-surfaces --prune-stale-runtime --dry-run --json | jq -e '.type == "external_surfaces_prune" and .dry_run == true and .receipt_path == null and (.summary.candidates | type) == "number" and (.candidates | type) == "array"'

      - name: Verify external surfaces stable generation diff
        run: |
          ./t external-surfaces --stable
          git diff --exit-code src/x8F88_external_surfaces.myc.md

      - name: Verify evidence JSON format
        run: ./t evidence --strict --json | jq -e '.strict_mode == true and .strict_ok == true'

      - name: Verify decisions JSON format
        run: ./t decisions --json | jq -e '.type == "decisions" and .position == "8/B" and (.summary.proposal_triage.review | type) == "number" and (.summary.proposal_triage.revalidate | type) == "number" and (.summary.receipt_evidence.strong | type) == "number" and (.summary.receipt_evidence.weak | type) == "number" and (.summary.receipt_evidence.none | type) == "number" and ([.entries[] | has("decision_outcome") and has("evidence_markers") and has("evidence_strength")] | all) and ([.entries[] | select(.id == "x5600_t20260509094224_trinity-chord-play_trinity-receipt-two-models-on-same-chord-multi-model-jam.myc") | select(.substance == true and .evidence_strength == "strong" and (.evidence_markers | index("target_chord_snapshot_comparison")))] | length) == 1 and ([.entries[] | select(.id == "x1000_t20260509175200_gemini_gemini-omega-deterministic-receipt.myc") | select(.substance == true and .evidence_strength == "strong" and (.evidence_markers | index("transition_receipt_evidence")))] | length) == 1 and ([.entries[] | select(.id == "x6700_t20260509175813_codex-gpt-5_codex-recommendation-sees-candidates.myc") | select(.substance == true and .evidence_strength == "strong" and (.evidence_markers | index("verification_commands")))] | length) == 1 and ([.entries[] | select(.id == "2026-05-14T182641Z-gemini-aye-receipt-envelope-promotion") | select(.substance == true and .evidence_strength == "strong" and (.evidence_markers | index("review_verdict")) and (.evidence_markers | index("artifact_falsifier")))] | length) == 1 and ([.entries[] | select(.id == "2026-05-15T095626Z-gemini-response-to-synthesis") | select(.substance == true and .evidence_strength == "strong" and (.evidence_markers | index("review_acknowledgement")))] | length) == 1 and ((.next_action == null) or ((.next_action.filename | type) == "string" and (.next_action.risks | type) == "array"))'

      - name: Verify decisions next action
        run: ./t decisions --next --json | jq -e '.type == "decisions_next" and .position == "8/B" and .action == "next" and ((.next_action == null) or ((.next_action.filename | type) == "string" and (.next_action.risks | type) == "array" and ((.next_action.triage_stance == null) or (.next_action.triage_stance | type) == "string")))'

      - name: Verify decisions triage queue
        run: ./t decisions --triage --json | jq -e '.type == "decisions_triage" and .position == "8/B" and .action == "triage" and (.summary.review | type) == "number" and (.summary.revalidate | type) == "number" and (.queue | type) == "array"'

      - name: Verify decisions triage template
        run: ./t decisions --triage-template --json | jq -e '.type == "decisions_triage_template" and .position == "8/B" and .action == "triage_template" and ((.empty == true and .target_id == null and .template == null) or (.empty == false and (.target_id | type) == "string" and (.suggested_filename | type) == "string" and (.template | contains("closes_hash")) and (.template | contains("decision_outcome")) and (.template | contains("resolution_status") | not)))'

      - name: Verify decisions closure validity (no invalid manual closures)
        run: |
          ./t decisions --json | jq -e '
            [ .entries[]
              | select(.resolution_status == "closed"
                       or .resolution_status == "superseded"
                       or .resolution_status == "historical")
              | select((.resolved_by_valid // true) == false)
            ] | length == 0'

      - name: Verify decisions stable generation diff
        run: |
          ./t decisions --stable
          git diff --exit-code src/x2B88_decisions.myc.md

      - name: Verify evidence stable report generation diff
        run: |
          ./t evidence --stable
          git diff --exit-code src/x7B88_evidence_report.myc.md

      - name: Verify generator idempotence (self projections)
        run: |
          # Exercise every generator. This catches crashes and non-determinism
          # even for the gitignored, regenerable projections (roadmap + per-voice,
          # *_memory, voices_state, probes) whose outputs are deliberately NOT
          # committed (see .gitignore: "regenerations stay out of git history").
          ./t agents --stable
          ./t skill --stable
          ./t memory --stable
          ./t roadmap --stable
          ./t probes --stable
          ./t decisions --stable
          ./t evidence --stable
          ./t external-surfaces --stable
          # NOTE: `network` (src/x8788_network.myc.md) is deliberately NOT exercised
          # or diffed here. It is a FEDERATION projection — its content depends on
          # the submodules (liquid/omega/myc node counts), which this job checks out
          # WITHOUT (submodules: false). Regenerating it here would produce a
          # trinity-only version and falsely red the diff. It is maintained where
          # the full tree exists: `t check` (author-side) and the daemon's
          # STABLE_GENERATORS. Its generator is still unit-tested (network_test.ts).
          # Diff only the TRACKED generated artifacts. `git diff --exit-code` on a
          # gitignored path is a silent no-op (always exits 0), so listing the
          # regenerable projections above here would assert nothing — their
          # generation is already exercised by the --stable calls above.
          git diff --exit-code \
            src/x88F0_agents_bootstrap.myc.md \
            src/x8CF0_skills_bootstrap.myc.md \
            src/x2B88_decisions.myc.md \
            src/x7B88_evidence_report.myc.md \
            src/x8F88_external_surfaces.myc.md

  # Verifies the meta-repo's core thesis: that the substrates (myc / omega=genesis
  # / liquid) actually check out and a cross-substrate computation runs green.
  # Isolated from `verify` so a failure here never reddens trinity-core CI.
  # myc + genesis (omega) are PUBLIC — fetched over anonymous HTTPS. Only liquid
  # is private, over a READ-ONLY SSH deploy key. Secret surface: one key, not three.
  cross-substrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          submodules: false # initialized manually below (public HTTPS + liquid key)

      - name: Set up read-only deploy key for the private liquid submodule
        env:
          LIQUID_DEPLOY_KEY: ${{ secrets.LIQUID_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$LIQUID_DEPLOY_KEY" > ~/.ssh/liquid && chmod 600 ~/.ssh/liquid
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host gh-liquid\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/liquid\n  IdentitiesOnly yes\n' >> ~/.ssh/config
          git config --global url."git@gh-liquid:s0fractal/liquid_architecture.git".insteadOf "https://github.com/s0fractal/liquid_architecture.git"

      - name: Initialize submodules (omega + myc public HTTPS, liquid over its key)
        run: |
          git submodule sync
          git submodule update --init
          git submodule status
          if git submodule status | grep -q '^-'; then
            echo "::error::one or more submodules failed to initialize"
            exit 1
          fi
          echo "all submodules initialized"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify cross-substrate phi roundtrip
        run: deno task fixture:phi

      # myc's descriptor/witness/audit self-check + omega's deterministic-kernel
      # deno tests. omega's atan2 WGSL parity test now skips cleanly on headless
      # runners (owner-side fix: it probes for a real GPU adapter, omega a1a82df).
      # NOT gated: liquid:audit — its 129-item namespace-drift "degraded" state is
      # expected/owner-territory/live-ledger (memory liquid-degraded-is-expected).
      - name: Verify forge package/source parity
        run: deno task forge:parity

      - name: Verify myc substrate self-check
        run: deno task check:myc

      - name: Verify omega deterministic-kernel deno tests
        run: deno task check:omega:deno

      # omega's Rust kernel — the deterministic physics "law". CPU-only.
      # Re-enabled after fixing the heap-use-after-free this gate originally
      # surfaced (omega e820563: a test discarded the snapshot/delta buffers the
      # lattice held raw pointers into; glibc aborted with "unaligned tcache
      # chunk", macOS hid it). Now ASAN- and -D-warnings-clean. Heaviest gate
      # (cold cargo build), runs last.
      - name: Verify omega deterministic-kernel Rust tests
        run: deno task check:omega:rust
