name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify formatting
        run: deno fmt --check

      - name: Type check core source files
        run: deno check src/*.ts

      - name: Substrate status check
        run: ./t status

      - name: Verify MYC x9 shadow status
        run: ./t myc-status-shadow --json | jq -e '.type == "status" and .position == "9/2E" and .shadow == true and .summary.overall == "healthy"'

      - name: Verify MYC x9 shadow capabilities
        run: ./t myc-capabilities-shadow --json | jq -e '.type == "capabilities" and .position == "9/4A" and .shadow == true and .summary.total >= 0'

      - name: Verify MYC x9 shadow protocol audit
        run: ./t myc-protocol-audit-shadow --json | jq -e '.type == "protocol_audit" and .position == "9/6C" and .shadow == true and .summary.overall == "healthy"'

      - name: Audit coordinates
        run: ./t audit --json | jq -e '.summary.mismatch == 0 and .summary.malformed == 0 and .summary.no_dipole_organ_gap == 0 and .summary.orphans_count == 0 and .coordinate_uniqueness.ok == true'

      - name: Verify clean export dry-run
        run: ./t export-clean --dry-run | jq -e '.type == "export_clean" and .position == "7/4" and .dry_run == true and .summary.files > 0'

      - name: Verify contracts
        run: ./t contracts

      - name: Verify contract ref-graph audit format
        run: ./t contract-audit --json | jq -e '.type == "contract_audit" and .summary.total > 0 and (.summary.safe_to_compost // 0) == 0 and (.summary.needs_review // 0) == 0'

      - name: Verify external surfaces format
        run: ./t external-surfaces --json | jq -e '.type == "external_surfaces"'

      - name: Verify evidence JSON format
        run: ./t evidence --strict --json | jq -e '.strict_mode == true and .strict_ok == true'

      - name: Verify decisions JSON format
        run: ./t decisions --json | jq -e '.type == "decisions" and .position == "8/B"'

      - name: Verify decisions closure validity (no invalid manual closures)
        run: |
          ./t decisions --json | jq -e '
            [ .entries[]
              | select(.resolution_status == "closed"
                       or .resolution_status == "superseded"
                       or .resolution_status == "historical")
              | select((.resolved_by_valid // true) == false)
            ] | length == 0'

      - name: Verify decisions stable generation diff
        run: |
          ./t decisions --stable
          git diff --exit-code src/x2B88_decisions.myc.md

      - name: Verify evidence stable report generation diff
        run: |
          ./t evidence --stable
          git diff --exit-code src/x7B88_evidence_report.myc.md

      - name: Verify generator idempotence (agents + skill + decisions + evidence)
        run: |
          ./t agents --stable
          ./t skill --stable
          ./t decisions --stable
          ./t evidence --stable
          git diff --exit-code \
            src/x88F0_agents_bootstrap.myc.md \
            src/x8CF0_skills_bootstrap.myc.md \
            src/x2B88_decisions.myc.md \
            src/x7B88_evidence_report.myc.md
