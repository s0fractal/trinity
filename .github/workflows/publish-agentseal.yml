name: publish-agentseal

# Event-driven, human-untied publication (same pattern as publish-canonical-receipt).
# A version bump on main → tests → `deno publish` via GitHub OIDC: no token, no human.
# ONE-TIME ACTIVATION: link the repo on jsr at
# https://jsr.io/@s0fractal/agentseal → Settings → GitHub repository → s0fractal/trinity.
# Depends (via jsr specifiers) on @s0fractal/{autonomy-kernel,canonical-receipt,witness}.

on:
  push:
    branches: [main]
    paths:
      - "packages/agentseal/**"
      - ".github/workflows/publish-agentseal.yml"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: stage standalone (escape the trinity workspace)
        run: cp -r packages/agentseal /tmp/agentseal

      - name: tests must pass (fail-closed)
        run: cd /tmp/agentseal && deno test -A

      # This is intentionally pinned: the bridge claims interoperability with a
      # concrete Warrant contract, not an unbounded future CLI. Unlike the unit
      # tests, this files, signs, and verifies a real evidence pack end to end.
      - name: Warrant 0.4 interoperability must pass (fail-closed)
        run: |
          python -m pip install warrant-verify==0.4.0
          cd /tmp/agentseal
          WARRANT_BIN="$(command -v warrant)" deno run -A examples/seal_to_warrant.ts

      - name: is this version already on jsr?
        id: v
        run: |
          VER=$(grep -m1 '"version"' /tmp/agentseal/deno.json | sed -E 's/.*"version" *: *"([^"]+)".*/\1/')
          CODE=$(curl -s -o /dev/null -w '%{http_code}' "https://jsr.io/@s0fractal/agentseal/${VER}_meta.json")
          [ "$CODE" = "200" ] && echo "exists=yes" >> "$GITHUB_OUTPUT" || echo "exists=no" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: publish a new, green version
        if: steps.v.outputs.exists == 'no'
        run: |
          echo "publishing @s0fractal/agentseal@${{ steps.v.outputs.version }}"
          cd /tmp/agentseal && deno publish --allow-dirty

      - name: already published — nothing to do
        if: steps.v.outputs.exists == 'yes'
        run: echo "@s0fractal/agentseal@${{ steps.v.outputs.version }} is already on jsr; skipping."
