name: publish-autonomy-kernel

# Event-driven, human-untied publication. When packages/autonomy-kernel bumps its
# version on main and its tests pass, this publishes to jsr via GitHub OIDC — no
# token, no human in the loop. A version bump IS the release event.
#
# ONE-TIME ACTIVATION (done): the repo is linked to the package on jsr, which
# authorizes this repo's OIDC identity to publish to the namespace.
#
# Fail-closed: tests must pass; only a NEW version is published (a re-run on an
# already-published version is skipped, never an error-loop).
#
# Everything runs from a copy OUTSIDE the trinity tree. The root deno.jsonc
# declares private submodules (./liquid, ./myc, ./omega) as workspace members that
# CI does not check out, so ANY `deno` command inside the tree fails loading them.
# The copy is also the package exactly as a standalone consumer receives it; OIDC
# comes from the Actions environment, not the working directory, so publishing from
# /tmp keeps the provenance attestation.

on:
  push:
    branches: [main]
    paths:
      - "packages/autonomy-kernel/**"
      - ".github/workflows/publish-autonomy-kernel.yml"

permissions:
  contents: read
  id-token: write # required for jsr OIDC publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: stage standalone (escape the trinity workspace)
        run: cp -r packages/autonomy-kernel /tmp/ak

      - name: tests must pass (fail-closed)
        run: cd /tmp/ak && deno test -A

      - name: is this version already on jsr?
        id: v
        run: |
          VER=$(grep -m1 '"version"' /tmp/ak/deno.json | sed -E 's/.*"version" *: *"([^"]+)".*/\1/')
          CODE=$(curl -s -o /dev/null -w '%{http_code}' "https://jsr.io/@s0fractal/autonomy-kernel/${VER}_meta.json")
          [ "$CODE" = "200" ] && echo "exists=yes" >> "$GITHUB_OUTPUT" || echo "exists=no" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: publish a new, green version
        if: steps.v.outputs.exists == 'no'
        run: |
          echo "publishing @s0fractal/autonomy-kernel@${{ steps.v.outputs.version }}"
          cd /tmp/ak && deno publish --allow-dirty

      - name: already published — nothing to do
        if: steps.v.outputs.exists == 'yes'
        run: echo "@s0fractal/autonomy-kernel@${{ steps.v.outputs.version }} is already on jsr; skipping."
